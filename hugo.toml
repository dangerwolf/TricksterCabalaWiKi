baseURL = "https://cabala.kylinwolf.com"
languageCode = "zh-cn"
title = "卡巴拉岛/星钻物语/Trickster资料站"
# theme = "PaperMod"
theme = "hugo-theme-m10c"



[params]
    ShowToc = true
    TocOpen = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    enableMathJax = true
    enableKaTeX = true
    enableMermaid = true

    author = "WOLF" 
    description = "Ph.D. student。守序中立。不主动、不拒绝、不承诺、不负责。喜欢🌈🏳️‍🌈配色和大气光学现象的异性恋的直男。"
    # 你可以放一个头像链接，如果不需要可以注释掉或删除
    avatar = "images/wolf.png" 

# ── 主菜单（顶栏导航）──
[menu]
  [[menu.main]]
    name = "主页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "地区任务"
    url = "/region-quest/"
    weight = 2
  [[menu.main]]
    name = "剧情任務"
    url = "/episode-quest/"
    weight = 3
  [[menu.main]]
    name = "BOSS攻略"
    url = "/boss-raiders/"
    weight = 4
  [[menu.main]]
    name = "混沌之塔"
    url = "/tower-of-chaos/"
    weight = 5
  [[menu.main]]
    name = "其他任務"
    url = "/other-quest/"
    weight = 6
  [[menu.main]]
    name = "角色技能"
    url = "/character-skill/"
    weight = 7
  [[menu.main]]
    name = "装备列"
    url = "/equipment/"
    weight = 8
  [[menu.main]]
    name = "遊戏系統"
    url = "/trickster-system/"
    weight = 9




        
[outputs]
  home = ["HTML", "JSON"]  # 为搜索索引生成 JSON

[permalinks]
  posts = "/:contentbasename/"

# --- 在文件末尾添加以下内容 ---

[markup]
# ── 侧边栏（可选：按分类列出子页面）──
  [markup.tableOfStyles]
    startLevel = 2
    endLevel = 3
  [markup.goldmark]
    [markup.goldmark.extensions]
      table = true # 确保表格扩展处于开启状态
    [markup.goldmark.renderer]
      # 设置为 true 来允许 Markdown 文件中的原始 HTML 标签
      unsafe = true
    [markup.goldmark.parser]
      attribute = true  # 必须为 true
    [markup.highlight]
      style = "monokai"
      linenos = true
      lineNumbersInTable = true
